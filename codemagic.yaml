workflows:
  flutter-build-ios:
    environment:
      groups:
        - my_project_secrets
      flutter: stable
      xcode: latest
      java: 17
    signing:
      xcode_project: "ios/Runner.xcodeproj"
      automatic_signing: true
      provisioning_profile_type: app_store
      entitlements: ios/Runner/Runner.entitlements
    scripts:
      - name: Clean Flutter and get dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      - name: Build iOS IPA (Release Mode)
        script: |
          # Usamos +100 para asegurarnos de superar cualquier build previo (3, 4, etc.)
          # El flag --release es vital para evitar el error de la pantalla negra
          flutter build ipa --release \
            --build-number=$(($BUILD_NUMBER + 100)) \
            --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true