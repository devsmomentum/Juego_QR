<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Real Life RPG - MapHunter">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MapHunter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MapHunter</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
  function intentarAbrirApp() {
    const isAndroid = /Android/i.test(navigator.userAgent);
    
    if (isAndroid) {
      // Fallback: si la app no está instalada, redirige a la página de descarga
      const fallbackUrl = "https://prueba.maphunter.online/";

      // Intent:
      // - Si la app está instalada: la abre apuntando al dominio actual
      // - Si NO está instalada: redirige a la página de descarga del APK
      const host = window.location.hostname;
      const intentUrl = `intent://${host}#Intent;scheme=https;package=com.map.hunter;S.browser_fallback_url=${encodeURIComponent(fallbackUrl)};end`;

      window.location.href = intentUrl;
    }
  }

  // Se ejecuta automáticamente al cargar la página de juego
  window.onload = intentarAbrirApp;
</script>
</body>
</html>
